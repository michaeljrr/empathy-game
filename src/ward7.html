*{margin:0;padding:0;box-sizing:border-box;}
body{

#dtxt{color:#a09050;font-size:10px;line-height:1.7;min-height:32px;}

.pip{width:10px;height:10px;border:1px solid #2a2008;background:#0a0806;}
.pip.lit{background:#586028;}
#ctrl{margin-left:auto;color:#2a2008;font-size:8px;letter-spacing:2px;}

   objs:[{x:215,lbl:'COMPUTER',    msg:'Patient records updated. Lab results for bed 2 filed. ✓',task:true,done:false},
         {x:455,lbl:'NOTICE BOARD',msg:'Staff meeting: 09:30. New admission expected at 08:00.',task:false,done:false}]},
  {name:'SUPPLY ROOM',bg:'supply',
   objs:[{x:198,lbl:'MED CABINET', msg:'Restocked. Bandages, gloves, syringes — counted and signed. ✓',task:true,done:false},
         {x:458,lbl:'EQUIPMENT',   msg:'Defibrillator: 100%. Emergency kit intact.',task:false,done:false}]},
];

let roomI=0,px=110,pvx=0,pframe=0,pftimer=0,facing=1;
let tasks=0,tick=0,mins=360;
let near=null,fading=false,fadeA=0,fadeTo=0;
const keys={};
window.addEventListener('keydown',e=>{if(!keys[e.code]){keys[e.code]=true;if(e.code==='KeyE'&&near)doInteract(near);}});
window.addEventListener('keyup',e=>keys[e.code]=false);

function say(n,t){document.getElementById('dname').textContent=n;document.getElementById('dtxt').textContent=t;}
function doInteract(o){
  say(o.lbl,o.msg);
  if(o.task&&!o.done){o.done=true;document.getElementById('p'+(tasks++)).classList.add('lit');
    if(tasks>=5)setTimeout(()=>say('SHIFT COMPLETE','All morning tasks completed. Excellent work, Nurse.'),700);}
}

function update(){
  if(fading)return;
  pvx=0;
  if(keys['ArrowLeft']||keys['KeyA']){pvx=-3;facing=-1;}
  if(keys['ArrowRight']||keys['KeyD']){pvx=3;facing=1;}
  px+=pvx;
  if(pvx!==0){if(++pftimer>10){pframe=(pframe+1)%4;pftimer=0;}}else pframe=0;
  if(px<28&&roomI>0){fading=true;fadeA=0;fadeTo=roomI-1;return;}
  if(px>W-28&&roomI<ROOMS.length-1){fading=true;fadeA=0;fadeTo=roomI+1;return;}
  px=Math.max(28,Math.min(W-28,px));
  near=null;
  for(const o of ROOMS[roomI].objs)if(Math.abs(px-o.x)<58){near=o;break;}
  if(++tick%18===0){mins++;const h=String(Math.floor(mins/60)).padStart(2,'0'),m=String(mins%60).padStart(2,'0');
    document.getElementById('clock').textContent=h+':'+m;}
}

function updateFade(){
  if(!fading)return;
  fadeA+=0.055;
  if(fadeA>=1&&fadeA-0.055<1){roomI=fadeTo;px=fadeTo<roomI+1?65:W-65;say(ROOMS[roomI].name,'You enter '+ROOMS[roomI].name.toLowerCase()+'.');}
  if(fadeA>=2){fading=false;fadeA=0;}
}

function r(c,x,y,w,h){cx.fillStyle=c;cx.fillRect(x,y,w,h);}
function hl(c,y){cx.fillStyle=c;cx.fillRect(0,y,W,1);}
function vl(c,x,y0,y1){cx.fillStyle=c;cx.fillRect(x,y0,1,y1-y0);}

function drawEnv(){
  r(K.ceil,0,0,W,20);
  r(K.ceilGlow,120,3,400,14);
  const g=cx.createLinearGradient(0,17,0,80);g.addColorStop(0,'rgba(190,180,130,0.18)');g.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=g;cx.fillRect(120,17,400,70);
  r(K.wallHi,0,20,W,148);
  for(let y=34;y<168;y+=22)hl(K.wallLine,y);
  for(let x=0;x<W;x+=44)vl(K.wallLine,x,20,168);
  r(K.furM,0,168,W,6);r(K.furD,0,173,W,3);
  r(K.wallLo,0,176,W,74);
  for(let y=190;y<250;y+=22)hl(K.wallLine,y);
  for(let x=0;x<W;x+=44)vl(K.wallLine,x,176,250);
  r(K.skirting,0,250,W,8);
  for(let tx=0;tx<W;tx+=44)for(let ty=258;ty<H;ty+=20)
    r((Math.floor(tx/44)+Math.floor((ty-258)/20))%2?K.floorB:K.floorA,tx,ty,44,20);
  r(K.floorHi,0,258,W,3);
  door(0);door(W-58);
}

function door(x){
  r(K.furD,x,86,58,172);r(K.furM,x+3,89,52,166);
  r(K.furL,x+5,98,48,68);r(K.furM,x+5,98,48,2);r(K.furM,x+5,164,48,2);r(K.furM,x+5,98,2,68);r(K.furM,x+51,98,2,68);
  r(K.furL,x+5,170,48,56);r(K.furM,x+5,170,48,2);r(K.furM,x+5,224,48,2);r(K.furM,x+5,170,2,56);r(K.furM,x+51,170,2,56);
  r(K.furH,x>0?x+12:x+42,196,7,5);
}

function drawEntrance(){
  r(K.furD,112,28,82,56);r(K.hatD,116,32,74,48);
  r(K.redX,148,36,14,40);r(K.redX,130,50,50,14);r(K.redD,156,36,6,40);r(K.redD,148,56,14,8);
  r(K.paper,117,33,60,10);cx.fillStyle=K.ink;cx.font='bold 6px Share Tech Mono';cx.fillText('DUTY ROSTER',119,41);
  [46,51,56,61,66].forEach(y=>r(K.inkM,119,y,50-(y-46)*3,2));
  r(K.furD,188,210,264,52);r(K.furM,188,204,264,9);
  r(K.furL,192,214,108,44);r(K.furL,354,214,94,44);
  r(K.furM,460,44,54,54);r(K.furD,460,44,54,3);r(K.furD,460,95,54,3);r(K.furD,460,44,3,54);r(K.furD,511,44,3,54);
  r(K.hatD,463,47,46,44);
  cx.strokeStyle=K.furH;cx.lineWidth=1;cx.beginPath();cx.arc(487,70,17,0,Math.PI*2);cx.stroke();
  r(K.ink,486,54,2,16);r(K.ink,487,70,14,2);
}

function drawWard(){
  [[50,168],[228,168],[404,168]].forEach(([bx,by])=>{
    r(K.furD,bx,by,150,22);r(K.furM,bx+2,by+2,146,18);r(K.furH,bx+4,by+4,44,12);
    r(K.furD,bx,by+22,150,4);r(K.furD,bx,by+86,150,4);
    r(K.hatW,bx+2,by+26,146,60);r(K.collar,bx+2,by+40,146,46);r(K.hatD,bx+2,by+40,146,2);
    r(K.ceilGlow,bx+6,by+28,62,12);r(K.hatD,bx+6,by+39,62,2);
    r(K.hatD,bx+16,by+46,52,8);r(K.hatD,bx+18,by+40,26,8);
    r(K.furD,bx,by+90,150,14);r(K.furM,bx+2,by+92,146,10);
  });
  [[198,146],[376,146]].forEach(([ix,iy])=>{
    r(K.furH,ix+8,iy,4,114);r(K.furD,ix,iy+109,24,5);
    r(K.tealHi,ix,iy-32,24,34);r(K.teal,ix,iy-32,24,4);r(K.teal,ix,iy-21,24,3);r(K.teal,ix,iy-11,24,3);
  });
  [[54,265],[408,265]].forEach(([cx2,cy])=>{
    r(K.paperD,cx2,cy,22,30);r(K.redX,cx2+1,cy,14,3);
    [5,10,15,20].forEach(dy=>r(K.ink,cx2+2,cy+dy,18,2));
  });
}

function drawStation(){
  r(K.furD,92,210,456,50);r(K.furM,92,204,456,9);
  r(K.furL,96,214,192,42);r(K.furL,352,214,192,42);
  r(K.ink,175,138,116,74);r(K.inkM,178,141,110,68);
  const sg=cx.createLinearGradient(179,142,179,208);sg.addColorStop(0,'#1e3424');sg.addColorStop(1,'#101c10');
  cx.fillStyle=sg;cx.fillRect(179,142,109,67);
  r('#28a050',180,143,106,3);
  for(let i=0;i<6;i++)r('#186030',182,148+i*9,74,6);
  r('#28a050',182,148,95,6);
  r(K.ink,216,210,28,8);r(K.ink,206,218,48,5);
  r(K.furD,398,28,172,120);r(K.paperD,402,32,164,112);
  cx.fillStyle=K.redX;cx.font='bold 7px Share Tech Mono';cx.fillText('  NOTICE BOARD',406,46);
  r(K.inkM,404,49,152,1);
  cx.fillStyle=K.furM;cx.font='7px Share Tech Mono';
  ['STAFF MTG — 09:30','NEW ADMIT @ 08:00','DR REYES ON CALL','WARD ROUNDS 07:30'].forEach((t,i)=>cx.fillText(t,406,60+i*16));
  r(K.redX,542,34,10,10);
}

function drawSupply(){
  r(K.furM,92,74,140,190);
  r(K.furL,96,78,132,88);r(K.furL,96,172,132,88);
  r(K.furD,96,78,3,90);r(K.furD,225,78,3,90);r(K.furD,96,172,3,90);r(K.furD,225,172,3,90);
  r(K.furH,154,124,14,10);r(K.furH,154,218,14,10);
  r(K.redX,152,82,14,36);r(K.redX,144,98,30,12);r(K.redD,160,82,6,36);r(K.redD,152,106,14,8);
  r(K.furD,364,74,200,194);
  for(let s=0;s<4;s++){
    r(K.furL,368,78+s*48,192,6);
    [[K.tealHi,K.hatW,K.paperD],[K.hatW,K.tealHi,K.paperD],[K.paperD,K.hatW,K.tealHi]][s%3].forEach((col,b)=>{
      r(col,372+b*60,85+s*48,52,40);r(K.inkM,376+b*60,88+s*48,34,2);r(K.inkM,376+b*60,93+s*48,22,2);
    });
  }
}

function drawNurse(){
  if(!spriteReady)return;
  const bob=(pframe===1||pframe===3)&&pvx!==0?-2:0;
  // Walk: very subtle lean/offset
  const walkOff=pvx!==0?(pframe===1?1:pframe===3?-1:0):0;

  const dw=SPR_W, dh=SPR_H;
  const nx=Math.round(px)-dw/2+walkOff;
  const ny=H-8-dh+bob;

  // Shadow
  cx.fillStyle='rgba(0,0,0,0.35)';
  cx.beginPath();cx.ellipse(px,H-6,dw*0.38,7,0,0,Math.PI*2);cx.fill();

  cx.save();
  if(facing===-1){
    // Flip horizontally around the sprite center
    cx.translate(Math.round(px)+walkOff,0);
    cx.scale(-1,1);
    cx.drawImage(nurseImg,-dw/2,ny,dw,dh);
  } else {
    cx.drawImage(nurseImg,nx,ny,dw,dh);
  }
  cx.restore();
}

function drawPrompts(){
  ROOMS[roomI].objs.forEach(o=>{
    if(o.done&&o.task)return;
    const isN=near===o;
    const p=0.5+0.5*Math.sin(tick*0.08);
    if(isN){
      const g=cx.createLinearGradient(o.x,50,o.x,280);
      g.addColorStop(0,'rgba(180,140,8,0)');g.addColorStop(.5,'rgba(180,140,8,'+(0.13*p)+')');g.addColorStop(1,'rgba(180,140,8,0)');
      cx.fillStyle=g;cx.fillRect(o.x-46,50,92,230);
    }
    cx.globalAlpha=isN?p:0.28;cx.fillStyle=isN?K.glow:K.paperD;
    cx.font=(isN?'bold ':'')+' 8px Share Tech Mono';cx.textAlign='center';
    cx.fillText((isN?'[E] ':'')+o.lbl,o.x,H-6);
    cx.globalAlpha=1;cx.textAlign='left';
  });
}

function drawNav(){
  if(roomI>0){
    cx.globalAlpha=0.7;cx.fillStyle=K.glow;
    cx.beginPath();cx.moveTo(22,H/2);cx.lineTo(44,H/2-13);cx.lineTo(44,H/2+13);cx.closePath();cx.fill();
    cx.globalAlpha=1;cx.fillStyle=K.paperD;cx.font='7px Share Tech Mono';
    cx.fillText(ROOMS[roomI-1].name.slice(0,15),48,H/2+3);
  }
  if(roomI<ROOMS.length-1){
    cx.globalAlpha=0.7;cx.fillStyle=K.glow;
    cx.beginPath();cx.moveTo(W-22,H/2);cx.lineTo(W-44,H/2-13);cx.lineTo(W-44,H/2+13);cx.closePath();cx.fill();
    cx.globalAlpha=1;cx.textAlign='right';cx.fillStyle=K.paperD;cx.font='7px Share Tech Mono';
    cx.fillText(ROOMS[roomI+1].name.slice(0,15),W-48,H/2+3);cx.textAlign='left';
  }
}

const grainC=document.createElement('canvas');grainC.width=W;grainC.height=H;
(()=>{const g=grainC.getContext('2d'),id=g.createImageData(W,H),d=id.data;
 for(let i=0;i<d.length;i+=4){const v=Math.random()*48|0;d[i]=d[i+1]=d[i+2]=v;d[i+3]=22;}
 g.putImageData(id,0,0);})();

function vignette(){
  const v=cx.createRadialGradient(W/2,H/2,80,W/2,H/2,380);
  v.addColorStop(0,'rgba(0,0,0,0)');v.addColorStop(1,'rgba(5,4,2,.7)');
  cx.fillStyle=v;cx.fillRect(0,0,W,H);
}

function draw(){
  cx.clearRect(0,0,W,H);
  drawEnv();
  const bg=ROOMS[roomI].bg;
  if(bg==='entrance')drawEntrance();
  else if(bg==='ward')drawWard();
  else if(bg==='station')drawStation();
  else if(bg==='supply')drawSupply();
  drawPrompts();
  drawNurse();
  drawNav();
  vignette();
  cx.drawImage(grainC,0,0);
  r('rgba(0,0,0,0.6)',0,0,W,17);
  cx.fillStyle=K.paperD;cx.font='8px Share Tech Mono';cx.fillText(ROOMS[roomI].name,8,12);
  r(K.inkM,0,17,W,1);
  if(fading){const a=fadeA<=1?fadeA:2-fadeA;r('rgba(5,4,2,'+a+')',0,0,W,H);}
}

function loop(){update();updateFade();draw();requestAnimationFrame(loop);}
say('SYSTEM','Use ← → to walk the ward. Approach highlighted objects and press E to interact.');
loop();
</script>
